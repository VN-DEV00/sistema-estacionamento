{% extends "base.html" %}
{% block title %}Registrar Saída{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card" style="border-top: 4px solid #ff4757; position: relative; overflow: hidden;">
            <div style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: radial-gradient(circle, rgba(255,71,87,0.2), transparent); border-radius: 50%; pointer-events: none;"></div>

            <div class="text-center mb-4">
                <h4 class="mt-3 text-white fw-bold">Registrar Saída</h4>
                <p class="text-muted small">Baixa de veículo no pátio</p>
            </div>

            <form method="POST">
                <div class="mb-4">
                    <label class="form-label text-muted" style="font-size: 13px;">Placa do Veículo (AAA0A00)</label>
                    <input type="text" name="placa" class="form-control form-control-lg text-center text-uppercase fw-bold" placeholder="AAA0A00" style="background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 24px; letter-spacing: 2px;" required autofocus>
                </div>
                <button type="submit" class="btn w-100 py-3 fw-bold" style="background: #ff4757; color: white; border-radius: 12px; font-size: 16px; box-shadow: 0 4px 15px rgba(255,71,87,0.3);">REGISTRAR SAÍDA</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
