{% extends "base.html" %}
{% block title %}Registrar Veículo{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="glass-card">
            <div class="mb-4">
                <h4 class="mb-0 text-white fw-bold"><i class="bi bi-pencil-square text-warning me-2"></i>Cadastro de Veículo</h4>
                <hr style="opacity: 0.1;">
            </div>
            
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label small" style="color: #c4c4c4;">Nome do Proprietário:</label>
                        <input type="text" name="nome" class="form-control" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white;" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label small" style="color: #c4c4c4;">Placa:</label>
                        <input type="text" name="placa" class="form-control text-uppercase" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white;" placeholder="AAA-0000" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label small" style="color: #c4c4c4;">Vínculo (Perfil):</label>
                        <select name="tipo" class="form-select" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; color-scheme: dark;" required>
                            <option value="Aluno">Aluno</option>
                            <option value="Professor">Professor</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label small" style="color: #c4c4c4;">Tipo de Veículo:</label>
                        <select name="veiculo" class="form-select" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; color-scheme: dark;" required>
                            <option value="Carro">Carro</option>
                            <option value="Moto">Moto</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex justify-content-between mt-4">
                    <a href="{{ url_for('menu') }}" class="btn btn-outline-light rounded-pill px-4">Cancelar</a>
                    <button type="submit" class="btn rounded-pill px-4" style="background: #bb86fc; color: #000; font-weight: bold; border: none;">SALVAR CADASTRO</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
