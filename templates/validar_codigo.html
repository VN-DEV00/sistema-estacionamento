{% extends "base.html" %}
{% block title %}Validar Código{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="glass-card p-4" style="border-top: 4px solid #bb86fc;">
            <div class="text-center mb-4">
                <h4 class="text-white fw-bold">Verificação de Segurança</h4>
                <p class="small" style="color: #c4c4c4;">Insira o código de 6 dígitos enviado ao seu e-mail.</p>
            </div>

            <form method="POST">
                <div class="mb-4">
                    <label class="form-label small" style="color: #c4c4c4;">Código de Verificação:</label>
                    <input type="text" name="codigo" class="form-control form-control-lg text-center fw-bold" 
                           maxlength="6" placeholder="000000" 
                           style="background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #00ff88; font-size: 28px; letter-spacing: 8px;" 
                           required autofocus>
                </div>

                <div class="mb-4">
                    <label class="form-label small" style="color: #c4c4c4;">Nova Senha:</label>
                    <input type="password" name="nova_senha" class="form-control" 
                           placeholder="Digite sua nova senha"
                           style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white;" 
                           required>
                </div>

                <button type="submit" class="btn w-100 py-3 fw-bold" 
                        style="background: #bb86fc; color: #000; border-radius: 12px; box-shadow: 0 4px 15px rgba(187, 134, 252, 0.3);">
                    REDEFINIR SENHA
                </button>
            </form>
            
            <div class="text-center mt-4">
                <a href="{{ url_for('recuperar_senha') }}" class="small" style="color: #bb86fc; text-decoration: none;">
                    <i class="bi bi-arrow-left"></i> Não recebeu o código? Tentar novamente
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
